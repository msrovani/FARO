[databases]
faro_db = host=localhost port=5432 dbname=faro_db user=faro password=CHANGE_ME_IN_PRODUCTION

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = md5
auth_file = userlist.txt

# Pool configuration
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

# Connection reset and health (best practices)
server_reset_query = DISCARD ALL
server_check_delay = 30
server_reset_query_always = 0  # Enable prepared statements for better performance

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Timeouts (optimized for production)
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
query_timeout = 0
client_idle_timeout = 0

# TCP keepalive (maintain connections over unreliable networks)
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3
