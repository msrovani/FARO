# PostgreSQL Tuning Configuration for F.A.R.O.
# Based on best practices for PostGIS and geospatial workloads
# Apply these settings to postgresql.conf and restart PostgreSQL

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================
# Max connections should be higher than PgBouncer max_client_conn
max_connections = 200

# =============================================================================
# MEMORY SETTINGS (adjust based on available RAM)
# =============================================================================
# Shared buffers: 25% of RAM (example for 8GB RAM = 2GB)
# Adjust based on your server's available memory
shared_buffers = 2GB

# Effective cache size: 75% of RAM (example for 8GB RAM = 6GB)
# This is the amount of memory available for disk caching
effective_cache_size = 6GB

# Work memory: memory per operation (sort, hash, etc.)
# Formula: (total RAM - shared_buffers) / (max_connections * 3)
# For 8GB RAM: (8192 - 2048) / (200 * 3) ≈ 10MB
work_mem = 16MB

# Maintenance work memory: memory for maintenance operations (VACUUM, CREATE INDEX)
# Should be larger for large databases
maintenance_work_mem = 512MB

# =============================================================================
# WRITE-AHEAD LOG (WAL) SETTINGS
# =============================================================================
# WAL buffers: increased for better write performance
wal_buffers = 64MB

# Checkpoint completion target: spread WAL writes over time
checkpoint_completion_target = 0.9

# Checkpoint timeout: more frequent checkpoints for better recovery time
checkpoint_timeout = 15min

# =============================================================================
# QUERY PLANNER
# =============================================================================
# Random page cost: lower for SSDs (default is 4.0, SSDs use 1.1-2.0)
random_page_cost = 1.1

# Effective IO concurrency: number of simultaneous IO operations
# For SSDs: 200-300, for HDDs: 2-10
effective_io_concurrency = 200

# =============================================================================
# POSTGIS-SPECIFIC TUNING
# =============================================================================
# Enable parallel query for PostGIS operations
# PostGIS can benefit from parallel processing for complex spatial queries
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# =============================================================================
# AUTOVACUUM SETTINGS
# =============================================================================
# Aggressive autovacuum for high-write workloads
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 10s

# Scale factors: trigger autovacuum more frequently
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Thresholds: minimum number of tuples before autovacuum
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# =============================================================================
# STATISTICS
# =============================================================================
# Track I/O timing for pg_stat_statements
track_io_timing = on

# Track functions for performance analysis
track_functions = all

# =============================================================================
# LOGGING
# =============================================================================
# Log slow queries for analysis
log_min_duration_statement = 1000  # Log queries taking > 1s

# Log checkpoint warnings
log_checkpoints = on

# Log connections and disconnections
log_connections = on
log_disconnections = on

# =============================================================================
# EXTENSIONS (to be enabled via SQL)
# =============================================================================
# Enable these extensions in your database:
# CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
# CREATE EXTENSION IF NOT EXISTS postgis;

# pg_stat_statements configuration (add to postgresql.conf)
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = off
pg_stat_statements.track_planning = off

# =============================================================================
# NOTES
# =============================================================================
# 1. Adjust memory settings based on your server's available RAM
# 2. Monitor performance using pg_stat_statements:
#    SELECT total_exec_time, mean_exec_time, calls, query 
#    FROM pg_stat_statements 
#    ORDER BY mean_exec_time DESC LIMIT 10;
# 3. Use EXPLAIN ANALYZE to analyze slow queries
# 4. Consider partitioning for large tables (e.g., observations by date)
# 5. Use CLUSTER on frequently accessed tables with spatial indexes:
#    CLUSTER table_name USING geom_index;
