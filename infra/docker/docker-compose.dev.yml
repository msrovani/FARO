# F.A.R.O. - Docker Compose para Desenvolvimento
# Versão simplificada para desenvolvimento local
# Inclui apenas: PostgreSQL, Redis, MinIO
# Exclui: Nginx, Prometheus, Grafana, etc.

version: '3.8'

services:
  # PostgreSQL com PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: faro-postgres-dev
    environment:
      POSTGRES_USER: faro
      POSTGRES_PASSWORD: faro
      POSTGRES_DB: faro_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faro-network

  # Redis para caching e streams
  redis:
    image: redis:7-alpine
    container_name: faro-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faro-network

  # MinIO para S3-compatible storage (OPTIONAL)
  # ⚠️ MinIO é OPTIONAL - FARO works com local storage fallback se não instalado
  # Para iniciar: docker-compose -f docker-compose.dev.yml up -d minio
  # Para pular: docker-compose -f docker-compose.dev.yml up -d (sem minio)
  # Porta 9000: MinIO S3 API (reservada)
  # Porta 9001: MinIO Console UI (reservada)
  # Porta 9002: Analytics Dashboard (usada para evitar conflitos)
  # Se MinIO não estiver disponível, assets são armazenados em ./local_assets/
  minio:
    image: minio/minio:latest
    container_name: faro-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - faro-network
    profiles:
      - minio  # Só inicia com --profile minio

  # Create MinIO bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb myminio/faro-assets || true;
      /usr/bin/mc policy set public myminio/faro-assets || true;
      exit 0;
      "
    networks:
      - faro-network
    profiles:
      - minio  # Só inicia com --profile minio

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  faro-network:
    driver: bridge
