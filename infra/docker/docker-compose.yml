version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: faro-postgres
    environment:
      POSTGRES_USER: faro
      POSTGRES_PASSWORD: faro_secret
      POSTGRES_DB: faro_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faro-network

  # Redis for caching and streams
  redis:
    image: redis:7-alpine
    container_name: faro-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faro-network

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: faro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - faro-network

  # Create MinIO bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/faro-assets || true;
      /usr/bin/mc policy set public myminio/faro-assets || true;
      exit 0;
      "
    networks:
      - faro-network

  # F.A.R.O. Server Core
  server:
    build:
      context: ../../server-core
      dockerfile: Dockerfile
    container_name: faro-server
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - AUTO_INIT_DB=false
      - DATABASE_URL=postgresql+asyncpg://faro:faro_secret@postgres:5432/faro_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_STREAMS_URL=redis://redis:6379/1
      - REDIS_CACHE_URL=redis://redis:6379/2
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=faro-assets
      - S3_SECURE=false
      - SECRET_KEY=CHANGE_ME_IN_PRODUCTION_32CHARS_MINIMUM
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=*
      - LOG_LEVEL=INFO
      - OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../server-core:/app
    networks:
      - faro-network

  # F.A.R.O. Async Worker (Redis Streams consumer)
  worker:
    build:
      context: ../../server-core
      dockerfile: Dockerfile
    container_name: faro-worker
    command: ["python", "-m", "app.workers.stream_worker"]
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - AUTO_INIT_DB=false
      - DATABASE_URL=postgresql+asyncpg://faro:faro_secret@postgres:5432/faro_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_STREAMS_URL=redis://redis:6379/1
      - REDIS_CACHE_URL=redis://redis:6379/2
      - REDIS_STREAMS_ENABLED=true
      - REDIS_STREAM_KEY=faro.events
      - REDIS_STREAM_GROUP=faro-analytics
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      server:
        condition: service_started
    volumes:
      - ../../server-core:/app
    networks:
      - faro-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: faro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - server
    networks:
      - faro-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: faro-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - faro-network

  # Alertmanager for useful operational alerts
  alertmanager:
    image: prom/alertmanager:latest
    container_name: faro-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - faro-network

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: faro-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - faro-network

  # OpenTelemetry collector for traces
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: faro-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - faro-network

  # Jaeger UI for trace analysis
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: faro-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4319:4317"
    networks:
      - faro-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  faro-network:
    driver: bridge
