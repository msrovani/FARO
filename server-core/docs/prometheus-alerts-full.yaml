  # --------------------------------------------------------------------------
  # GRUPO 11: ALERT OPERATIONS
  # --------------------------------------------------------------------------
  - name: faro_alert_operations
    interval: 30s
    rules:

    # Alerta 11.1: Alertas críticos não reconhecidos
    - alert: CriticalAlertNotAcknowledged
      expr: sum(faro_alert_total{severity="critical"}) - sum(faro_alert_acknowledged_total) > 10
      for: 1h
      severity: critical
      triggers_when: |
        Mais de 10 alertas criticos pendentes de reconhecimento.
      insight: |
        Alertas importantes nao estao sendo tratados.
        Risco operacional: situacoes criticas ignoradas.
      possible_causes: |
        1. Analista sobrecarregado
        2. Sistema de notificacao falhando
        3. Turnover baixo
      solutions: |
        # Verificar notificacoes:
        # curl /alerts | jq '.[] | select(.severity=="critical" and .acknowledged==false)'
        
        # Escalonar:
        # POST /alerts/escalate
      annotations:
        summary: "Alertas criticos pendentes"

    # Alerta 11.2: Tempo de resolução alto
    - alert: HighAlertResolutionTime
      expr: histogram_quantile(0.95, rate(faro_alert_resolution_time_seconds_bucket[1h])) > 3600
      for: 30m
      severity: warning
      triggers_when: |
        Tempo P95 de resolucao de alertas excede 1 hora.
      insight: |
        Alertas estao demorando muito para serem resolvidos.
        Eficiencia operacional abaixo do ideal.
      solutions: |
        # Analisar tempo por algoritmo:
        # curl /metrics | grep alert_resolution
        
        # Priorizar alertasautomaticamente:
        # Habilitar queue_auto_prioritization=true
      annotations:
        summary: "Tempo de resolucao de alertas alto"

    # Alerta 11.3: Alertas por algoritmo desbalanceados
    - alert: AlgorithmAlertImbalance
      expr: (max(faro_alert_by_algorithm_total) - min(faro_alert_by_algorithm_total)) / max(faro_alert_by_algorithm_total) > 0.8
      for: 1h
      severity: warning
      triggers_when: |
        Um algoritmo esta gerando >80% dos alertas.
      insight: |
        Algoritmo pode estar com threshold muito baixo.
        Risco: fatigue de alertas.
      solutions: |
        # Analisar distribuicao:
        # curl /metrics | grep alert_by_algorithm
        
        # Ajustar thresholds:
        # config.py: ALGORITHM_THRESHOLDS
      annotations:
        summary: "Desbalanceamento de alertas por algoritmo"

  # --------------------------------------------------------------------------
  # GRUPO 12: SUSPICION ANALYTICS
  # --------------------------------------------------------------------------
  - name: faro_suspicion_analytics
    interval: 30s
    rules:

    # Alerta 12.1: Baixa taxa de acerto de suspeita
    - alert: LowSuspicionAccuracy
      expr: rate(faro_suspicion_confirmed_total[1h]) / (rate(faro_suspicion_confirmed_total[1h]) + rate(faro_suspicion_rejected_total[1h])) < 0.5
      for: 1h
      severity: warning
      triggers_when: |
        Taxa de confirmacao de suspeitas inferior a 50%.
      insight: |
        Algoritmos gerando muitos falso positivos.
        Agentes estao perdendo tempo com alertas desnecessarios.
      possible_causes: |
        1. Thresholds dos algoritmos muito baixos
        2. Dados de treinamento desatualizados
        3. Falta de contexto operacional
      solutions: |
        # Analisar rejeicoes por algoritmo:
        # curl /metrics | grep suspicion_rejected
        
        # Ajustar thresholds:
        # POST /config/algorithms/thresholds
        
        # Coletar mais dados para retreino
      annotations:
        summary: "Baixa taxa de acerto de suspeitas"

    # Alerta 12.2: Alta reincidência de suspeita
    - alert: HighSuspicionRecurrence
      expr: rate(faro_suspicion_recurrence_total{recurrence_number="2"}[1h]) > 10
      for: 1h
      severity: warning
      triggers_when: |
        Mais de 10 reincidencias (2a abordagem) por hora.
      insight: |
        Mesma placa sendo abordada repetidamente.
        Pode indicar: watchlist nao atualizada, algoritmo nao evoluindo, ou abordagem inefetiva.
      possible_causes: |
        1. Watchlist desatualizada
        2. Score nao diminui apos abordagem
        3. Agente nao entende feedback
      solutions: |
        # Verificar watchlist:
        # GET /intelligence/watchlists
        
        # Verificar feedback recebido:
        # GET /mobile/sync | jq '.feedback'
        
        # Atualizar scoreapos abordagem:
        # POST /observations/{id}/approach-confirmation
      annotations:
        summary: "Alta reincidencia de suspeitas"

    # Alerta 12.3: Severidade CRITICAL acumulada
    - alert: CriticalSuspicionsAccumulated
      expr: faro_suspicion_severity_current{severity="critical"} > 50
      for: 30m
      severity: critical
      triggers_when: |
        Mais de 50 suspeitas CRITICAL ativas.
      insight: |
        Grande volume de situacoes criticas nao tratadas.
        Risco operacional elevado.
      possible_causes: |
        1. Evento operacional em andamento
        2. Sistema de triagem sobrecarregado
        3. Falta de recurso humano
      solutions: |
        # Priorizar fila:
        # GET /intelligence/queue?sort=severity
        
        # Escalonar para outras unidades:
        # POST /intelligence/escalate
        
        # Verificar eventos ativos:
        # GET /analytics/events
      annotations:
        summary: "Acumulo de suspeitas criticas"

    # Alerta 12.4: Baixa taxa de abordagem
    - alert: LowApproachRate
      expr: histogram_quantile(0.5, rate(faro_suspicion_approach_rate_bucket[24h])) < 0.3
      for: 6h
      severity: warning
      triggers_when: |
        Menos de 30% das suspeitas estao levando a abordagem.
      insight: |
        Suspeitas geradas nao estao sendo tratadas pelos agentes.
        Pipeline operacional pode estar quebrado.
      possible_causes: |
        1. Agentes nao estao recebendo alertas
        2. Notificacao push falhando
        3. Agentes desativando notificacoes
      solutions: |
        # Verificar notificacoes:
        # GET /analytics/notifications
        
        # Verificar dispositivos:
        # GET /intelligence/devices
        
        # Forcar sync:
        # POST /mobile/sync/trigger
      annotations:
        summary: "Baixa taxa de abordagem efetiva"

  # --------------------------------------------------------------------------
